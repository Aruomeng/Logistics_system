server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: supply-chain

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/supply_chain?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: TYH041113
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: TYH041113
      database: 0
      timeout: 3000ms

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # DevTools 热重启
  devtools:
    restart:
      enabled: true

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleteFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: logistics-supply-chain-jwt-secret-key-2026-must-be-at-least-256-bits-long
  access-token-expiration: 7200000 # 2小时 (ms)
  refresh-token-expiration: 604800000 # 7天 (ms)

# 文件上传配置 (本地存储)
file:
  upload-dir: ./upload
  access-url: /files

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# 日志配置
logging:
  level:
    com.logistics: debug
    org.springframework.security: info
  file:
    name: logs/supply-chain.log
